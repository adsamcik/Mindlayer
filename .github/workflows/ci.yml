name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build all modules
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            sdk/build/reports/tests/
            shared/build/reports/tests/
          retention-days: 14

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            app/build/test-results/
            sdk/build/test-results/
            shared/build/test-results/
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            sdk/build/reports/lint-results-debug.html
          retention-days: 14

  build-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ build-and-test ]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build release AAB (without model)
        run: ./gradlew :app:bundleRelease --no-daemon
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAB
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30
