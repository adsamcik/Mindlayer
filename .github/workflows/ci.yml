name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21 (compile target 17)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build all modules
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      # PR #42 (signature|knownSigner trust architecture) introduced a
      # release-only Kotlin compile error (`Unresolved reference
      # 'debugSeedIfApplicable'`) that slipped past CI because the workflow
      # only ran the debug variant. PR #43 fixed it, and this step ensures
      # the same class of regression is caught at PR time: the unit-test
      # task implicitly runs `:app:compileReleaseKotlin` and
      # `:app:compileReleaseUnitTestKotlin` first, so any release-only
      # source-set compile error fails the PR.
      #
      # We intentionally do NOT run `:app:assembleRelease` /
      # `:app:bundleRelease` here:
      #   - they require `-PmodelSha256` (release integrity guard, PR #34)
      #     which is gated on `vars.MODEL_SHA256` and lives in the
      #     `build-bundle` job that already runs on `main`;
      #   - and they prefer a signing keystore that is only present via
      #     `secrets.ANDROID_KEYSTORE_*`, which fork PRs cannot read.
      # The unit-test task is exempted from `validateReleaseModelSha256`
      # in `app/build.gradle.kts` (it excludes any task name containing
      # "UnitTest"), so it runs on PRs from forks without any secrets.
      - name: Run release-variant unit tests
        run: ./gradlew :app:testReleaseUnitTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            sdk/build/reports/tests/
            sdk-camerax/build/reports/tests/
            shared/build/reports/tests/
          retention-days: 14

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: |
            app/build/test-results/
            sdk/build/test-results/
            sdk-camerax/build/test-results/
            shared/build/test-results/
          retention-days: 14

  # Instrumented tests run on two API levels:
  #   - API 33 — the contracted "must pass" CI gate. Robolectric also pins to 33.
  #   - API 34 — first OS where FGS `specialUse` property enforcement and the
  #     predictive-back default flip are actually live; we want to catch
  #     regressions there before they ship.
  #
  # Ramp plan: API 34 is NON-BLOCKING (`continue-on-error: true`) while we
  # observe stability. Flip `continue-on-error` to `false` once it has produced
  # 5 consecutive green runs on `main`. API 33 is the only required entry for now.
  #
  # API 26 is temporarily omitted. It repeatedly passed `:app` and `:sdk`
  # instrumented tests on CI, then the pinned emulator-runner action hung in
  # teardown until the job was cancelled. Re-enable API 26 once the runner or
  # emulator image can exit cleanly after a successful test run.
  #
  # Per-entry arch/target overrides exist because system-image availability
  # differs across API levels:
  #   - API 33: x86_64 / default — historical CI pin; do not change without a
  #     5-run regression check.
  #   - API 34: x86_64 / google_apis — the AOSP `default` image for API 34 has
  #     historically been slower to land and more flake-prone on Linux runners;
  #     `google_apis` is the well-trodden path. Revisit if/when we rely on
  #     Play-Services-only behaviour (we don't today).
  # If any of these guesses turn out wrong, CI itself will surface it — the
  # action will fail to download the system image and we adjust.
  instrumented-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: ${{ matrix.api-level != 33 }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        api-level: [33, 34]
        include:
          - api-level: 33
            arch: x86_64
            target: default
          - api-level: 34
            arch: x86_64
            target: google_apis

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21 (compile target 17)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.arch }}-${{ matrix.target }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Provision AI Pack assets
        id: ai-pack
        if: ${{ vars.PADDLEOCR_DET_SHA256 != '' && vars.PADDLEOCR_REC_SHA256 != '' && vars.PADDLEOCR_CLS_SHA256 != '' && vars.PADDLEOCR_DICT_SHA256 != '' }}
        shell: bash
        env:
          PADDLEOCR_DET_SHA256: ${{ vars.PADDLEOCR_DET_SHA256 }}
          PADDLEOCR_REC_SHA256: ${{ vars.PADDLEOCR_REC_SHA256 }}
          PADDLEOCR_CLS_SHA256: ${{ vars.PADDLEOCR_CLS_SHA256 }}
          PADDLEOCR_DICT_SHA256: ${{ vars.PADDLEOCR_DICT_SHA256 }}
        run: |
          set -euo pipefail
          declare -A hashes=(
            [PADDLEOCR_DET_SHA256]="${PADDLEOCR_DET_SHA256}"
            [PADDLEOCR_REC_SHA256]="${PADDLEOCR_REC_SHA256}"
            [PADDLEOCR_CLS_SHA256]="${PADDLEOCR_CLS_SHA256}"
            [PADDLEOCR_DICT_SHA256]="${PADDLEOCR_DICT_SHA256}"
          )
          for name in "${!hashes[@]}"; do
            if [[ ! "${hashes[$name]}" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::${name} repository variable must be a lowercase 64-character SHA-256 digest"
              exit 1
            fi
          done

          asset_dir="paddleocr_model/src/main/assets"
          det_file="${asset_dir}/paddleocr-ppocrv5-mobile-det.tflite"
          rec_file="${asset_dir}/paddleocr-ppocrv5-mobile-rec.tflite"
          cls_file="${asset_dir}/paddleocr-ppocrv5-mobile-cls.tflite"
          dict_file="${asset_dir}/paddleocr-ppocrv5-mobile-dict.txt"
          manifest_file="${asset_dir}/paddleocr_model_integrity.json"
          required_files=("${det_file}" "${rec_file}" "${dict_file}" "${manifest_file}")
          missing=()
          for path in "${required_files[@]}"; do
            [[ -s "$path" ]] || missing+=("$path")
          done
          if (( ${#missing[@]} != 0 )); then
            echo "have-pack=false" >> "$GITHUB_OUTPUT"
            printf '::notice title=AI Pack absent::PaddleOCR production coexistence test will assumeTrue-skip — missing: %s\n' "${missing[*]}"
            exit 0
          fi

          declare -A expected_by_path=(
            ["${det_file}"]="${PADDLEOCR_DET_SHA256}"
            ["${rec_file}"]="${PADDLEOCR_REC_SHA256}"
            ["${dict_file}"]="${PADDLEOCR_DICT_SHA256}"
          )
          for path in "${!expected_by_path[@]}"; do
            actual="$(sha256sum "$path" | awk '{print $1}')"
            if [[ "$actual" != "${expected_by_path[$path]}" ]]; then
              echo "::error::${path} SHA-256 does not match its repository variable"
              exit 1
            fi
          done
          if [[ -s "${cls_file}" ]]; then
            actual="$(sha256sum "${cls_file}" | awk '{print $1}')"
            if [[ "$actual" != "${PADDLEOCR_CLS_SHA256}" ]]; then
              echo "::error::${cls_file} SHA-256 does not match PADDLEOCR_CLS_SHA256"
              exit 1
            fi
          else
            echo "::notice title=AI Pack optional classifier absent::Continuing with det/rec/dict PaddleOCR bundle."
          fi
          echo "have-pack=true" >> "$GITHUB_OUTPUT"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        env:
          # `reactivecircus/android-emulator-runner@v2.37.0` splits the
          # `script:` input on every newline and runs each line in its
          # own `sh -c`, which silently breaks multi-line shell
          # constructs (if/then/else/fi). The driver script keeps the
          # conditional in one bash program; we surface its inputs via
          # env vars on the step.
          HAVE_AI_PACK: ${{ steps.ai-pack.outputs.have-pack }}
          PADDLEOCR_DET_SHA256: ${{ vars.PADDLEOCR_DET_SHA256 }}
          PADDLEOCR_REC_SHA256: ${{ vars.PADDLEOCR_REC_SHA256 }}
          PADDLEOCR_CLS_SHA256: ${{ vars.PADDLEOCR_CLS_SHA256 }}
          PADDLEOCR_DICT_SHA256: ${{ vars.PADDLEOCR_DICT_SHA256 }}
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash scripts/ci/instrumented-tests.sh

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: instrumented-test-reports-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            sdk/build/reports/androidTests/
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21 (compile target 17)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            sdk/build/reports/lint-results-debug.html
          retention-days: 14

  validate-release-shas:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Retained as a future direct-Play-upload prerequisite, but disabled while
    # hosted CI has no authenticated model-artifact retrieval.
    if: ${{ false }}
    permissions:
      contents: read
    outputs:
      release-shas-ready: ${{ steps.check.outputs.release-shas-ready }}

    steps:
      - name: Validate release SHA repository variables
        id: check
        shell: bash
        run: |
          required=(
            MODEL_SHA256
            PADDLEOCR_DET_SHA256
            PADDLEOCR_REC_SHA256
            PADDLEOCR_CLS_SHA256
            PADDLEOCR_DICT_SHA256
            EMBEDDING_MODEL_SHA256
            EMBEDDING_TOKENIZER_SHA256
          )
          missing=()
          invalid=()
          for name in "${required[@]}"; do
            value="${!name:-}"
            if [[ -z "$value" ]]; then
              missing+=("$name")
              echo "::notice title=$name::unset"
            else
              echo "::notice title=$name::set"
              if [[ ! "$value" =~ ^[0-9a-f]{64}$ ]]; then
                invalid+=("$name")
              fi
            fi
          done

          if (( ${#invalid[@]} > 0 )); then
            printf '::error::Release SHA vars must be lowercase 64-character SHA-256 digests: %s\n' "${invalid[*]}"
            exit 1
          fi
          if (( ${#missing[@]} > 0 )); then
            printf '::notice title=Release AAB skipped::Missing release SHA repository variables: %s\n' "${missing[*]}"
            echo "release-shas-ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "release-shas-ready=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          MODEL_SHA256: ${{ vars.MODEL_SHA256 }}
          PADDLEOCR_DET_SHA256: ${{ vars.PADDLEOCR_DET_SHA256 }}
          PADDLEOCR_REC_SHA256: ${{ vars.PADDLEOCR_REC_SHA256 }}
          PADDLEOCR_CLS_SHA256: ${{ vars.PADDLEOCR_CLS_SHA256 }}
          PADDLEOCR_DICT_SHA256: ${{ vars.PADDLEOCR_DICT_SHA256 }}
          EMBEDDING_MODEL_SHA256: ${{ vars.EMBEDDING_MODEL_SHA256 }}
          EMBEDDING_TOKENIZER_SHA256: ${{ vars.EMBEDDING_TOKENIZER_SHA256 }}

  build-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ build-and-test, validate-release-shas ]
    # Disabled until CI has authenticated retrieval for the private multi-GB
    # model payload and direct Play upload. Production AABs are signed locally;
    # hosted CI must never publish an unsigned or incomplete bundle.
    if: ${{ false }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify model artefacts are present
        id: check-bundle
        shell: bash
        run: |
          # The repo intentionally does NOT commit the multi-gigabyte model
          # payloads. On a clean CI checkout these paths are missing whenever
          # an upstream artefact-upload step has not run; that's the normal
          # pre-release state.
          required_files=(
            ".models/gemma-4-E2B-it.litertlm"
            ".models/paddleocr-ppocrv5-mobile-det.tflite"
            ".models/paddleocr-ppocrv5-mobile-rec.tflite"
            ".models/paddleocr-ppocrv5-mobile-cls.tflite"
            ".models/paddleocr-ppocrv5-mobile-dict.txt"
            ".models/embedding-gemma-300m-v1.tflite"
            ".models/embedding-gemma-300m-v1.spm.model"
          )
          missing=()
          for path in "${required_files[@]}"; do
            if [[ ! -s "$path" ]]; then
              missing+=("$path")
            fi
          done
          if (( ${#missing[@]} == 0 )); then
            echo "have-bundle=true" >> "$GITHUB_OUTPUT"
          else
            echo "have-bundle=false" >> "$GITHUB_OUTPUT"
            printf '::notice title=AAB build skipped::Missing model artefacts: %s\n' "${missing[*]}"
          fi

      - name: Set up JDK 21 (compile target 17)
        if: steps.check-bundle.outputs.have-bundle == 'true'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        if: steps.check-bundle.outputs.have-bundle == 'true'
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Setup Gradle
        if: steps.check-bundle.outputs.have-bundle == 'true'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build release AAB
        if: steps.check-bundle.outputs.have-bundle == 'true'
        run: |
          ./gradlew :app:bundleRelease --no-daemon --no-configuration-cache \
            -PmodelSha256="${MODEL_SHA256}" \
            -PpaddleOcrDetSha256="${PADDLEOCR_DET_SHA256}" \
            -PpaddleOcrRecSha256="${PADDLEOCR_REC_SHA256}" \
            -PpaddleOcrClsSha256="${PADDLEOCR_CLS_SHA256}" \
            -PpaddleOcrDictSha256="${PADDLEOCR_DICT_SHA256}" \
            -PembeddingModelSha256="${EMBEDDING_MODEL_SHA256}" \
            -PembeddingTokenizerSha256="${EMBEDDING_TOKENIZER_SHA256}"
        env:
          MODEL_SHA256: ${{ vars.MODEL_SHA256 }}
          PADDLEOCR_DET_SHA256: ${{ vars.PADDLEOCR_DET_SHA256 }}
          PADDLEOCR_REC_SHA256: ${{ vars.PADDLEOCR_REC_SHA256 }}
          PADDLEOCR_CLS_SHA256: ${{ vars.PADDLEOCR_CLS_SHA256 }}
          PADDLEOCR_DICT_SHA256: ${{ vars.PADDLEOCR_DICT_SHA256 }}
          EMBEDDING_MODEL_SHA256: ${{ vars.EMBEDDING_MODEL_SHA256 }}
          EMBEDDING_TOKENIZER_SHA256: ${{ vars.EMBEDDING_TOKENIZER_SHA256 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Report release signing mode
        if: steps.check-bundle.outputs.have-bundle == 'true'
        shell: bash
        run: |
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" && -n "${ANDROID_KEYSTORE_PASSWORD:-}" && -n "${ANDROID_KEY_ALIAS:-}" && -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            echo "Release AAB was built with CI signing secrets."
          else
            echo "::warning::Release AAB is unsigned because CI signing secrets are not configured."
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB
        if: steps.check-bundle.outputs.have-bundle == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30
