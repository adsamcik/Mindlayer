name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Build all modules
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            sdk/build/reports/tests/
            shared/build/reports/tests/
          retention-days: 14

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: |
            app/build/test-results/
            sdk/build/test-results/
            shared/build/test-results/
          retention-days: 14

  # Instrumented tests run on three API levels:
  #   - API 26 — minSdk floor; we want to verify the integration path actually
  #     boots and the `BIND_ML_SERVICE` permission + service binding still works
  #     on the oldest supported platform.
  #   - API 33 — the contracted "must pass" CI gate. Robolectric also pins to 33.
  #   - API 34 — first OS where FGS `specialUse` property enforcement and the
  #     predictive-back default flip are actually live; we want to catch
  #     regressions there before they ship.
  #
  # Ramp plan: API 26 and API 34 are NON-BLOCKING (`continue-on-error: true`)
  # while we observe stability. Flip `continue-on-error` to `false` for an
  # entry once it has produced 5 consecutive green runs on `main`. API 33 is
  # the only required entry for now.
  #
  # Per-entry arch/target overrides exist because system-image availability
  # differs across API levels:
  #   - API 26: x86_64 / default — the AOSP image is the simplest match and
  #     covers the surface our :ml service uses (no Play Services dependency).
  #   - API 33: x86_64 / default — historical CI pin; do not change without a
  #     5-run regression check.
  #   - API 34: x86_64 / google_apis — the AOSP `default` image for API 34 has
  #     historically been slower to land and more flake-prone on Linux runners;
  #     `google_apis` is the well-trodden path. Revisit if/when we rely on
  #     Play-Services-only behaviour (we don't today).
  # If any of these guesses turn out wrong, CI itself will surface it — the
  # action will fail to download the system image and we adjust.
  #
  # Keep `-no-snapshot` on the test run itself. API 26 has been observed to pass
  # all tests and then hang until the job timeout while the emulator tears down a
  # snapshot-backed process; cold-booting the cached AVD keeps cleanup bounded.
  instrumented-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: ${{ matrix.api-level != 33 }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 33, 34]
        include:
          - api-level: 26
            arch: x86_64
            target: default
          - api-level: 33
            arch: x86_64
            target: default
          - api-level: 34
            arch: x86_64
            target: google_apis

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.arch }}-${{ matrix.target }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 5
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          force-avd-creation: false
          emulator-options: -no-snapshot -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest :sdk:connectedDebugAndroidTest --no-daemon

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: instrumented-test-reports-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            sdk/build/reports/androidTests/
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            sdk/build/reports/lint-results-debug.html
          retention-days: 14

  build-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ build-and-test ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Validate model hash input
        run: |
          if [[ ! "${MODEL_SHA256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::MODEL_SHA256 repository variable must be a lowercase 64-character SHA-256 digest"
            exit 1
          fi
        env:
          MODEL_SHA256: ${{ vars.MODEL_SHA256 }}

      - name: Build release AAB
        run: ./gradlew :app:bundleRelease --no-daemon -PmodelSha256="${MODEL_SHA256}"
        env:
          MODEL_SHA256: ${{ vars.MODEL_SHA256 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Report release signing mode
        shell: bash
        run: |
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" && -n "${ANDROID_KEYSTORE_PASSWORD:-}" && -n "${ANDROID_KEY_ALIAS:-}" && -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            echo "Release AAB was built with CI signing secrets."
          else
            echo "::warning::Release AAB is unsigned because CI signing secrets are not configured."
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30
