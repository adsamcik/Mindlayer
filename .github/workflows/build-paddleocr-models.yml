name: Build PaddleOCR PP-OCRv5 mobile .tflite models

# ── Manual conversion pipeline ────────────────────────────────────────────
#
# Converts the upstream PaddleOCR PP-OCRv5 mobile artifacts from Paddle
# format to the TFLite format that the on-device LiteRT runtime consumes:
#
#   PaddleOCR PP-OCRv5 mobile (det/rec/cls Paddle params)
#           v  paddle2onnx 2.1.0
#   ONNX (intermediate, never shipped)
#           v  onnx2tf 2.4.0
#   .tflite x 3  +  dict.txt
#
# This workflow is NOT part of the per-PR or per-push CI gate. It is
# triggered manually whenever a new PP-OCRv5 mobile release lands upstream
# and produces an artifact bundle a human reviews + uploads to Play
# Asset Delivery. The SHA-256 values of the four artifacts are written
# into the GitHub workflow summary and into the artifact ZIP's
# `expected_shas.txt` so they can be plugged into the `MODEL_SHA256`,
# `PADDLEOCR_DET_SHA256`, `PADDLEOCR_REC_SHA256`, `PADDLEOCR_CLS_SHA256`,
# `PADDLEOCR_DICT_SHA256` repository variables.
#
# Privacy/security: no network access from the runtime artifacts; this
# workflow only downloads upstream PaddleOCR sources at conversion time
# (matches the project's offline + no-runtime-network rules). The output
# .tflite files are pure model weights with no network behavior.
#
# Soak rule: every pinned community tool in this workflow is at least 7
# days old at the time the workflow was authored:
#   - PaddleOCR v3.5.0 (released 2026-04-21)
#   - paddle2onnx v2.1.0 (released 2026-01-12)
#   - onnx2tf v2.4.0 (released 2026-04-01)
# Re-confirm soak compliance whenever you bump any of these.

on:
  workflow_dispatch:
    inputs:
      paddleocr_ref:
        description: "PaddleOCR git ref (tag or sha) to convert from"
        required: true
        default: "v3.5.0"
      paddle2onnx_version:
        description: "paddle2onnx pip version (must be >=7 days old)"
        required: true
        default: "2.1.0"
      onnx2tf_version:
        description: "onnx2tf pip version (must be >=7 days old)"
        required: true
        default: "2.4.0"

concurrency:
  group: build-paddleocr-models-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  convert:
    name: Convert PaddleOCR PP-OCRv5 mobile -> .tflite
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          # onnx2tf 2.x requires Python >= 3.12; paddle2onnx 2.1.0
          # supports cp312, and TensorFlow 2.19.1 satisfies onnx2tf 2.4.0's
          # ml-dtypes/protobuf pins. The original 2026-05-19 run
          # (#26124473504) failed on Python 3.11 with "ERROR: No matching
          # distribution found for onnx2tf==2.4.0".
          python-version: '3.12'

      - name: Install conversion tools (pinned)
        run: |
          set -euo pipefail

          # paddle2onnx 2.1.0 and onnx2tf 2.4.0 intentionally use
          # incompatible ONNX versions. Keep them in isolated virtualenvs so
          # the pinned conversion chain stays reproducible.
          python -m venv .venv-paddle2onnx
          .venv-paddle2onnx/bin/python -m pip install --upgrade pip
          .venv-paddle2onnx/bin/python -m pip install \
            "setuptools==80.9.0" \
            "paddlepaddle==3.0.0" \
            "paddle2onnx==${{ inputs.paddle2onnx_version }}" \
            "onnx==1.16.2" \
            "onnxruntime==1.18.1" \
            "protobuf==4.25.4" \
            "numpy==1.26.4"

          python -m venv .venv-onnx2tf
          .venv-onnx2tf/bin/python -m pip install --upgrade pip
          .venv-onnx2tf/bin/python -m pip install \
            "onnx2tf==${{ inputs.onnx2tf_version }}" \
            "tensorflow==2.19.1" \
            "protobuf==4.25.5" \
            "numpy==1.26.4"

          .venv-paddle2onnx/bin/python -c "import importlib.metadata as m; print('paddle2onnx=', m.version('paddle2onnx')); print('onnx=', m.version('onnx'))"
          .venv-onnx2tf/bin/python -c "import importlib.metadata as m; print('onnx2tf=', m.version('onnx2tf')); print('onnx=', m.version('onnx')); print('tensorflow=', m.version('tensorflow'))"

      - name: Fetch PaddleOCR PP-OCRv5 mobile artifacts
        env:
          PADDLEOCR_REF: ${{ inputs.paddleocr_ref }}
        run: |
          set -euo pipefail
          mkdir -p paddle-src tflite-out
          cd paddle-src
          # PaddleOCR v3 publishes PP-OCRv5 mobile artifacts through the
          # PaddleX official inference-model bucket. We download the release
          # tag's source tree to pick up the canonical dictionary, then
          # download det/rec plus the lightweight text-line orientation model.

          # Source tree (for dict.txt):
          curl -fsSL -o paddleocr-src.tar.gz \
            "https://github.com/PaddlePaddle/PaddleOCR/archive/refs/tags/${PADDLEOCR_REF}.tar.gz"
          tar -xzf paddleocr-src.tar.gz --strip-components=1 -C .

          base_url="https://paddle-model-ecology.bj.bcebos.com/paddlex/official_inference_model/paddle3.0.0"
          declare -A model_urls=(
            [det]="${base_url}/PP-OCRv5_mobile_det_infer.tar"
            [rec]="${base_url}/PP-OCRv5_mobile_rec_infer.tar"
            [cls]="${base_url}/PP-LCNet_x0_25_textline_ori_infer.tar"
          )
          declare -A model_dirs=(
            [det]="PP-OCRv5_mobile_det_infer"
            [rec]="PP-OCRv5_mobile_rec_infer"
            [cls]="PP-LCNet_x0_25_textline_ori_infer"
          )
          for kind in det rec cls; do
            tar_name="${model_dirs[$kind]}.tar"
            curl -fsSL -o "$tar_name" "${model_urls[$kind]}"
            tar -xf "$tar_name"
            if [ ! -d "${model_dirs[$kind]}" ]; then
              echo "::error::Expected ${model_dirs[$kind]} after extracting $tar_name."
              exit 1
            fi
          done

          ls -1

      - name: Convert Paddle -> ONNX
        run: |
          set -euo pipefail
          cd paddle-src
          declare -A model_dirs=(
            [det]="PP-OCRv5_mobile_det_infer"
            [rec]="PP-OCRv5_mobile_rec_infer"
            [cls]="PP-LCNet_x0_25_textline_ori_infer"
          )
          for kind in det rec cls; do
            dir="${model_dirs[$kind]}"
            if [ ! -d "$dir" ]; then
              echo "::error::Required Paddle model directory missing: $dir."
              exit 1
            fi
            ../.venv-paddle2onnx/bin/paddle2onnx \
              --model_dir "$dir" \
              --model_filename inference.json \
              --params_filename inference.pdiparams \
              --save_file "../tflite-out/paddleocr-ppocrv5-mobile-${kind}.onnx" \
              --opset_version 17 \
              --enable_onnx_checker True
          done
          ls -1 ../tflite-out

      - name: Convert ONNX -> TFLite (float32, mobile-tuned)
        run: |
          set -euo pipefail
          cd tflite-out
          # LiteRT CompiledModel has no resize API in the Android Java surface
          # used by Mindlayer. Emit fixed-shape artifacts so the on-device
          # runner can allocate stable input/output TensorBuffers.
          declare -A onnx_input_dims=(
            [det]="1,3,640,640"
            [rec]="1,3,48,320"
            [cls]="1,3,80,160"
          )
          for kind in det rec cls; do
            onnx="paddleocr-ppocrv5-mobile-${kind}.onnx"
            if [ ! -f "$onnx" ]; then
              echo "::error::Required ONNX file missing: $onnx."
              exit 1
            fi
            fixed_onnx="paddleocr-ppocrv5-mobile-${kind}-fixed.onnx"
            input_name=$(../.venv-paddle2onnx/bin/python - "$onnx" "$fixed_onnx" "${onnx_input_dims[$kind]}" <<'PY'
          import sys
          import onnx

          model = onnx.load(sys.argv[1])
          output_path = sys.argv[2]
          static_shape = [int(part) for part in sys.argv[3].split(",")]
          if len(model.graph.input) != 1:
              raise SystemExit(f"Expected one input, found {len(model.graph.input)}")
          graph_input = model.graph.input[0]
          dims = graph_input.type.tensor_type.shape.dim
          if len(dims) != len(static_shape):
              raise SystemExit(
                  f"Expected input rank {len(static_shape)}, found {len(dims)} for {graph_input.name}"
              )
          for dim, value in zip(dims, static_shape):
              dim.ClearField("dim_param")
              dim.dim_value = value
          onnx.save(model, output_path)
          print(graph_input.name)
          PY
          )
            ../.venv-onnx2tf/bin/onnx2tf \
              -i "$fixed_onnx" \
              -o "ppocrv5-${kind}-saved" \
              -ois "${input_name}:${onnx_input_dims[$kind]}" \
              -osd
            generated="ppocrv5-${kind}-saved/paddleocr-ppocrv5-mobile-${kind}-fixed_float32.tflite"
            if [ ! -f "$generated" ]; then
              echo "::error::Expected onnx2tf float32 output missing: $generated"
              find "ppocrv5-${kind}-saved" -maxdepth 2 -type f -print
              exit 1
            fi
            mv "$generated" "paddleocr-ppocrv5-mobile-${kind}.tflite"
            rm -rf "ppocrv5-${kind}-saved"
          done
          ../.venv-onnx2tf/bin/python <<'PY'
          import sys
          import tensorflow as tf

          expected = {
              "det": [1, 640, 640, 3],
              "rec": [1, 48, 320, 3],
              "cls": [1, 80, 160, 3],
          }

          for kind, shape in expected.items():
              path = f"paddleocr-ppocrv5-mobile-{kind}.tflite"
              interpreter = tf.lite.Interpreter(model_path=path)
              input_details = interpreter.get_input_details()
              if len(input_details) != 1:
                  print(f"::error::{path} expected one input, found {len(input_details)}")
                  sys.exit(1)
              actual_shape = input_details[0]["shape"].tolist()
              signature = input_details[0].get("shape_signature", input_details[0]["shape"]).tolist()
              if actual_shape != shape:
                  print(f"::error::{path} input shape {actual_shape} != expected {shape}")
                  sys.exit(1)
              if any(dim < 0 for dim in signature):
                  print(f"::error::{path} still has dynamic input signature {signature}")
                  sys.exit(1)
              print(f"{path} input shape OK: {actual_shape}")
          PY
          ls -1

      - name: Stage character dictionary
        run: |
          set -euo pipefail
          # PaddleOCR ppocr_v5_dict.txt path (subject to small changes
          # across releases — keep this lookup tolerant).
          for candidate in \
            paddle-src/ppocr/utils/dict/ppocr_v5_dict.txt \
            paddle-src/ppocr/utils/ppocr_keys_v5.txt \
            paddle-src/ppocr/utils/dict/ppocrv5_dict.txt; do
            if [ -f "$candidate" ]; then
              cp "$candidate" tflite-out/paddleocr-ppocrv5-mobile-dict.txt
              echo "Used dictionary: $candidate"
              break
            fi
          done
          if [ ! -f tflite-out/paddleocr-ppocrv5-mobile-dict.txt ]; then
            echo "::error::Could not locate PP-OCRv5 character dictionary in source tree."
            exit 1
          fi

      - name: Compute SHA-256 manifest
        id: shas
        run: |
          set -euo pipefail
          cd tflite-out
          required_files=(
            paddleocr-ppocrv5-mobile-det.tflite
            paddleocr-ppocrv5-mobile-rec.tflite
            paddleocr-ppocrv5-mobile-cls.tflite
            paddleocr-ppocrv5-mobile-dict.txt
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Required converted artifact missing: $f"
              exit 1
            fi
          done
          {
            echo "# PaddleOCR PP-OCRv5 mobile artifact SHA-256 values"
            echo "# Generated by .github/workflows/build-paddleocr-models.yml"
            echo "# Plug into MODEL_SHA256 family of repository variables."
            echo ""
            for f in "${required_files[@]}"; do
              sha=$(sha256sum "$f" | awk '{print $1}')
              echo "$f  $sha"
            done
          } | tee expected_shas.txt
          {
            echo "## PaddleOCR PP-OCRv5 mobile conversion result"
            echo ""
            echo '```'
            cat expected_shas.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload converted models
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: paddleocr-ppocrv5-mobile-tflite
          path: |
            tflite-out/paddleocr-ppocrv5-mobile-det.tflite
            tflite-out/paddleocr-ppocrv5-mobile-rec.tflite
            tflite-out/paddleocr-ppocrv5-mobile-cls.tflite
            tflite-out/paddleocr-ppocrv5-mobile-dict.txt
            tflite-out/expected_shas.txt
          retention-days: 30
          if-no-files-found: error
