name: Publish SDK

on:
  push:
    tags:
      - 'v*'    # e.g. v0.1.0, v1.2.3
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21 (compile target 17)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Run tests before publishing
        run: ./gradlew testDebugUnitTest --no-daemon

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ test ]
    if: github.ref_type == 'tag'
    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Extract version from tag
        id: version
        run: |
          SEMVER_REGEX='[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?([+][0-9A-Za-z][0-9A-Za-z.-]*)?'
          if [[ "$REF_TYPE" == "tag" ]]; then
            if [[ ! "$REF_NAME" =~ ^v${SEMVER_REGEX}$ ]]; then
              echo "::error::Release tags must be v<semver> (for example v1.2.3 or v1.2.3-rc.1)"
              exit 1
            fi
            VERSION="${REF_NAME#v}"
          else
            VERSION="0.0.0-SNAPSHOT"
          fi
          if [[ ! "$VERSION" =~ ^${SEMVER_REGEX}$ && "$VERSION" != "0.0.0-SNAPSHOT" ]]; then
            echo "::error::Invalid publish version"
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'Publishing version: %s\n' "$VERSION"
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}

      - name: Set up JDK 21 (compile target 17)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Check if version already published
        id: probe-packages
        run: |
          set -euo pipefail

          package_version_names() {
            local package_name="$1"
            local endpoint="/users/${GITHUB_OWNER}/packages/maven/${package_name}/versions"
            local response

            # --paginate checks every page; --jq emits one version name per line and fails on invalid JSON.
            if response="$(gh api --paginate "$endpoint" --jq '.[].name' 2>&1)"; then
              printf '%s\n' "$response"
              return 0
            fi

            if grep -Eq 'HTTP 404|"status": ?"404"' <<<"$response"; then
              return 1
            fi

            printf '::error::Failed to query package %s: %s\n' "$package_name" "$response" >&2
            return 2
          }

          should_publish() {
            local label="$1"
            local package_name="$2"
            local output_name="$3"
            local result_var="$4"
            local version_names

            if version_names="$(package_version_names "$package_name")"; then
              if grep -Fxq "$PUBLISH_VERSION" <<<"$version_names"; then
                echo "::notice::${label} $PUBLISH_VERSION already published — skipping"
                echo "${output_name}=false" >> "$GITHUB_OUTPUT"
                printf -v "$result_var" '%s' 'false'
              else
                echo "${output_name}=true" >> "$GITHUB_OUTPUT"
                printf -v "$result_var" '%s' 'true'
              fi
            else
              local status=$?
              if [[ "$status" -eq 1 ]]; then
                echo "::notice::${label} package does not exist yet — publishing $PUBLISH_VERSION"
                echo "${output_name}=true" >> "$GITHUB_OUTPUT"
                printf -v "$result_var" '%s' 'true'
              else
                exit "$status"
              fi
            fi
          }

          should_publish "shared" "com.adsamcik.mindlayer.shared" "publish-shared" publish_shared
          should_publish "sdk" "com.adsamcik.mindlayer.sdk" "publish-sdk" publish_sdk

          if [[ "$publish_shared" == "false" && "$publish_sdk" == "false" ]]; then
            echo "::notice::All SDK Maven packages for $PUBLISH_VERSION are already published — publish steps will be skipped"
          fi
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}

      - name: Publish shared to GitHub Packages
        if: steps.probe-packages.outputs.publish-shared == 'true'
        run: ./gradlew :shared:publishReleasePublicationToGitHubPackagesRepository --no-daemon -PpublishVersion="$PUBLISH_VERSION"
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}

      - name: Publish SDK to GitHub Packages
        if: steps.probe-packages.outputs.publish-sdk == 'true'
        run: ./gradlew :sdk:publishReleasePublicationToGitHubPackagesRepository --no-daemon -PpublishVersion="$PUBLISH_VERSION"
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        id: gh-release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          body: |
            ## SDK ${{ steps.version.outputs.version }}

            ```kotlin
            implementation("com.adsamcik.mindlayer:sdk:${{ steps.version.outputs.version }}")
            ```

            ## Service APK / AAB

            The signed `:app` Android App Bundle (and, when CI signing
            secrets are configured, a signed APK) is attached to this
            release by the `release-aab` job below — if present, it
            installs the Mindlayer service that the SDK above talks to.
            Sideload-friendly users can grab the universal APK; Play
            Store distribution uses the AAB. See `RELEASE.md` for the
            full signing flow.

  release-aab:
    # Phase 3 #5 (p3-signed-release): attach the service-side AAB (and
    # universal APK when bundletool is available) to the GitHub Release
    # so end users can actually install the service the SDK talks to.
    # Mirrors the build matrix in `ci.yml` -> `release-aab` job so the
    # MODEL_SHA256 / PADDLEOCR_* / EMBEDDING_* + ANDROID_KEYSTORE_* secret
    # discipline is identical.
    # Skipped silently when the gemma .litertlm payload is not yet
    # uploaded — the artifact-upload step in the model-publish flow
    # gates this end of the pipeline too.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [ publish ]
    if: github.ref_type == 'tag' && vars.MODEL_SHA256 != ''
    permissions:
      # Need write to upload assets to the GitHub Release that the
      # `publish` job above just created.
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify model artefacts are present
        id: check-bundle
        shell: bash
        run: |
          required_files=(
            "gemma_model/src/main/assets/gemma-4-E2B-it.litertlm"
            "paddleocr_model/src/main/assets/paddleocr-ppocrv5-mobile-det.tflite"
            "paddleocr_model/src/main/assets/paddleocr-ppocrv5-mobile-rec.tflite"
            "paddleocr_model/src/main/assets/paddleocr-ppocrv5-mobile-cls.tflite"
            "paddleocr_model/src/main/assets/paddleocr-ppocrv5-mobile-dict.txt"
            "gemma_embed_model/src/main/assets/embedding-gemma-300m-v1.tflite"
            "gemma_embed_model/src/main/assets/embedding-gemma-300m-v1.spm.model"
          )
          missing=()
          for path in "${required_files[@]}"; do
            if [[ ! -s "$path" ]]; then
              missing+=("$path")
            fi
          done
          if (( ${#missing[@]} == 0 )); then
            echo "have-bundle=true" >> "$GITHUB_OUTPUT"
          else
            echo "have-bundle=false" >> "$GITHUB_OUTPUT"
            printf '::notice title=AAB build skipped::Missing model artefacts for release-aab: %s\n' "${missing[*]}"
          fi

      - name: Set up JDK 21 (compile target 17)
        if: steps.check-bundle.outputs.have-bundle == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        if: steps.check-bundle.outputs.have-bundle == 'true'
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Setup Gradle
        if: steps.check-bundle.outputs.have-bundle == 'true'
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Validate model hash inputs
        if: steps.check-bundle.outputs.have-bundle == 'true'
        run: |
          declare -A hashes=(
            [MODEL_SHA256]="${MODEL_SHA256}"
            [PADDLEOCR_DET_SHA256]="${PADDLEOCR_DET_SHA256}"
            [PADDLEOCR_REC_SHA256]="${PADDLEOCR_REC_SHA256}"
            [PADDLEOCR_CLS_SHA256]="${PADDLEOCR_CLS_SHA256}"
            [PADDLEOCR_DICT_SHA256]="${PADDLEOCR_DICT_SHA256}"
            [EMBEDDING_MODEL_SHA256]="${EMBEDDING_MODEL_SHA256}"
            [EMBEDDING_TOKENIZER_SHA256]="${EMBEDDING_TOKENIZER_SHA256}"
          )
          for name in "${!hashes[@]}"; do
            if [[ ! "${hashes[$name]}" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::${name} repository variable must be a lowercase 64-character SHA-256 digest"
              exit 1
            fi
          done
        env:
          MODEL_SHA256: ${{ vars.MODEL_SHA256 }}
          PADDLEOCR_DET_SHA256: ${{ vars.PADDLEOCR_DET_SHA256 }}
          PADDLEOCR_REC_SHA256: ${{ vars.PADDLEOCR_REC_SHA256 }}
          PADDLEOCR_CLS_SHA256: ${{ vars.PADDLEOCR_CLS_SHA256 }}
          PADDLEOCR_DICT_SHA256: ${{ vars.PADDLEOCR_DICT_SHA256 }}
          EMBEDDING_MODEL_SHA256: ${{ vars.EMBEDDING_MODEL_SHA256 }}
          EMBEDDING_TOKENIZER_SHA256: ${{ vars.EMBEDDING_TOKENIZER_SHA256 }}

      - name: Build release AAB
        if: steps.check-bundle.outputs.have-bundle == 'true'
        run: |
          ./gradlew :app:bundleRelease --no-daemon \
            -PmodelSha256="${MODEL_SHA256}" \
            -PpaddleOcrDetSha256="${PADDLEOCR_DET_SHA256}" \
            -PpaddleOcrRecSha256="${PADDLEOCR_REC_SHA256}" \
            -PpaddleOcrClsSha256="${PADDLEOCR_CLS_SHA256}" \
            -PpaddleOcrDictSha256="${PADDLEOCR_DICT_SHA256}" \
            -PembeddingModelSha256="${EMBEDDING_MODEL_SHA256}" \
            -PembeddingTokenizerSha256="${EMBEDDING_TOKENIZER_SHA256}"
        env:
          MODEL_SHA256: ${{ vars.MODEL_SHA256 }}
          PADDLEOCR_DET_SHA256: ${{ vars.PADDLEOCR_DET_SHA256 }}
          PADDLEOCR_REC_SHA256: ${{ vars.PADDLEOCR_REC_SHA256 }}
          PADDLEOCR_CLS_SHA256: ${{ vars.PADDLEOCR_CLS_SHA256 }}
          PADDLEOCR_DICT_SHA256: ${{ vars.PADDLEOCR_DICT_SHA256 }}
          EMBEDDING_MODEL_SHA256: ${{ vars.EMBEDDING_MODEL_SHA256 }}
          EMBEDDING_TOKENIZER_SHA256: ${{ vars.EMBEDDING_TOKENIZER_SHA256 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Report release signing mode
        if: steps.check-bundle.outputs.have-bundle == 'true'
        shell: bash
        run: |
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" && -n "${ANDROID_KEYSTORE_PASSWORD:-}" && -n "${ANDROID_KEY_ALIAS:-}" && -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            echo "Release AAB built with CI signing secrets."
          else
            echo "::warning::Release AAB built UNSIGNED because CI signing secrets are not configured. Install the locally-signed AAB manually via Play Console; do not distribute this artifact to end users."
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Locate AAB artifact
        if: steps.check-bundle.outputs.have-bundle == 'true'
        id: locate-aab
        shell: bash
        run: |
          AAB_PATH="$(find app/build/outputs/bundle/release -name '*.aab' -print -quit)"
          if [[ -z "$AAB_PATH" ]]; then
            echo "::error::No AAB found under app/build/outputs/bundle/release/"
            exit 1
          fi
          echo "aab-path=$AAB_PATH" >> "$GITHUB_OUTPUT"
          echo "Found AAB at $AAB_PATH"

      - name: Attach AAB to GitHub Release
        if: steps.check-bundle.outputs.have-bundle == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ${{ steps.locate-aab.outputs.aab-path }}
          fail_on_unmatched_files: true

      - name: Upload AAB as workflow artifact (30-day retention)
        if: steps.check-bundle.outputs.have-bundle == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mindlayer-service-${{ github.ref_name }}-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

