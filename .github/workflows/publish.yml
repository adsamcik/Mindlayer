name: Publish SDK

on:
  push:
    tags:
      - 'v*'    # e.g. v0.1.0, v1.2.3
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Run tests before publishing
        run: ./gradlew testDebugUnitTest --no-daemon

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ test ]
    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: |
          SEMVER_REGEX='[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?([+][0-9A-Za-z][0-9A-Za-z.-]*)?'
          if [[ "$REF_TYPE" == "tag" ]]; then
            if [[ ! "$REF_NAME" =~ ^v${SEMVER_REGEX}$ ]]; then
              echo "::error::Release tags must be v<semver> (for example v1.2.3 or v1.2.3-rc.1)"
              exit 1
            fi
            VERSION="${REF_NAME#v}"
          else
            VERSION="0.0.0-SNAPSHOT"
          fi
          if [[ ! "$VERSION" =~ ^${SEMVER_REGEX}$ && "$VERSION" != "0.0.0-SNAPSHOT" ]]; then
            echo "::error::Invalid publish version"
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'Publishing version: %s\n' "$VERSION"
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Publish shared to GitHub Packages
        run: ./gradlew :shared:publishReleasePublicationToGitHubPackagesRepository --no-daemon -PpublishVersion="$PUBLISH_VERSION"
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}

      - name: Publish SDK to GitHub Packages
        run: ./gradlew :sdk:publishReleasePublicationToGitHubPackagesRepository --no-daemon -PpublishVersion="$PUBLISH_VERSION"
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          body: |
            ## SDK ${{ steps.version.outputs.version }}

            ```kotlin
            implementation("com.adsamcik.mindlayer:sdk:${{ steps.version.outputs.version }}")
            ```
