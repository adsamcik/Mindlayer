name: Publish SDK

on:
  push:
    tags:
      - 'v*'    # e.g. v0.1.0, v1.2.3
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests before publishing
        run: ./gradlew testDebugUnitTest --no-daemon

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ test ]
    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-SNAPSHOT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish shared to GitHub Packages
        run: ./gradlew :shared:publishReleasePublicationToGitHubPackagesRepository --no-daemon -PpublishVersion=${{ steps.version.outputs.version }}
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish SDK to GitHub Packages
        run: ./gradlew :sdk:publishReleasePublicationToGitHubPackagesRepository --no-daemon -PpublishVersion=${{ steps.version.outputs.version }}
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## SDK ${{ steps.version.outputs.version }}

            ```kotlin
            implementation("com.adsamcik.mindlayer:sdk:${{ steps.version.outputs.version }}")
            ```
